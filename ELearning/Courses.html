<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <div class="container">
                <button class="btn navbar-toggler rounded-3" data-bs-toggle="collapse" data-bs-target="#navi">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-brand mx-auto"><img src="favicon.png" width="90"></div>
                <div class="collapse navbar-collapse justify-content-center" id="navi">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a href="Dashboard.html" class="nav-link">Dashboard</a></li>
                        <li class="nav-item"><a href="Courses.html" class="nav-link active disabled">Courses</a></li>
                        <li class="nav-item"><a href="Quiz.html" class="nav-link">Quiz</a></li>
                    </ul>
                </div>
                <div class="ms-auto">
                    <div class="dropdown">
                        <button class="btn btn-outline-light d-flex align-items-center gap-2 dropdown-toggle no-arrow rounded-3" data-bs-toggle="dropdown">
                            <img src="https://img.icons8.com/puffy/1200/test-account.jpg" class="rounded-circle border" width="30" height="30">
                            <span>Rishav</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="Profile.html">Profile</a></li>
                            <li><a class="dropdown-item disabled">Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger disabled">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="Dashboard.html">Dashboard</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Courses</li>
                </ol>
            </nav>

            <div class="content-wrapper">
                <h1 class="mb-4">Available Courses</h1>
                <p class="lead">Explore our comprehensive course catalog</p>

                <div class="table-container mt-4">
                    <h2 class="mb-3">Course Overview</h2>
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Course ID</th>
                                <th>Course Name</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Progress</th>
                            </tr>
                        </thead>
                        <tbody id="courseTableBody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>

                <div class="mt-5">
                    <h2 class="mb-4">Course Details</h2>
                    <div class="course-container" id="courseContainer">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 d-flex align-items-center gap-2">
                    <img src="favicon.png" width="90">
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
